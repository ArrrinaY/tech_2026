name: profile-service-ci

on:
  push:
    paths:
      - "project/src/profile_service/**"
      - "project/src/common/**"
      - ".github/workflows/profile-service-ci.yml"
  pull_request:
    paths:
      - "project/src/profile_service/**"
      - "project/src/common/**"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project/src/profile_service/requirements.txt
          pip install -r project/src/common/requirements.txt

      - name: Run profile service tests
        env:
          PYTHONPATH: project/src
        run: pytest -q project/src/profile_service/tests
