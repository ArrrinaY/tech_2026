name: bot-service-ci

on:
  push:
    paths:
      - "project/src/bot_service/**"
      - "project/src/common/**"
      - "pytest.ini"
      - ".github/workflows/bot-service-ci.yml"
  pull_request:
    paths:
      - "project/src/bot_service/**"
      - "project/src/common/**"
      - "pytest.ini"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project/src/common/requirements.txt
          pip install -r project/src/bot_service/requirements.txt

      - name: Run bot service smoke tests
        env:
          PYTHONPATH: project/src
        run: pytest -q project/src/bot_service/tests
